<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>재고 현황 - PLC 재고관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo"><i class="fas fa-microchip"></i><span class="logo-text">PLC 재고관리</span></div>
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
  </div>
  <ul class="sidebar-menu">
    <li class="menu-item"><a href="index.html"><i class="fas fa-tachometer-alt"></i><span>대시보드</span></a></li>
    <li class="menu-item"><a href="materials.html"><i class="fas fa-boxes"></i><span>자재 관리</span></a></li>
    <li class="menu-item"><a href="scan.html"><i class="fas fa-barcode"></i><span>바코드 스캔</span></a></li>
    <li class="menu-item"><a href="transactions.html"><i class="fas fa-exchange-alt"></i><span>입출고 이력</span></a></li>
    <li class="menu-item active"><a href="inventory.html"><i class="fas fa-clipboard-list"></i><span>재고 현황</span></a></li>
    <li class="menu-item"><a href="categories.html"><i class="fas fa-sitemap"></i><span>카테고리 관리</span></a></li>
    <li class="menu-item"><a href="handlers.html"><i class="fas fa-users"></i><span>담당자 관리</span></a></li>
  </ul>
  <div class="sidebar-footer"><span>v1.0.0</span></div>
</nav>
<main class="main-content" id="mainContent">
  <header class="topbar">
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="topbar-title"><h1><i class="fas fa-clipboard-list"></i> 재고 현황</h1></div>
    <div class="topbar-actions"><span class="date-badge" id="currentDate"></span></div>
  </header>
  <div class="content-area">
    <div class="card">
      <div class="card-header">
        <h2><i class="fas fa-clipboard-list"></i> 재고 현황</h2>
        <div class="card-actions">
  <input type="text" id="searchInput" placeholder="자재명 / 자재코드 / 카테고리 / 위치 검색..." class="search-input">

  <select id="filterStatus" class="filter-select">
    <option value="">전체 상태</option>
    <option value="ok">정상</option>
    <option value="low">부족</option>
    <option value="critical">없음</option>
  </select>

  <select id="sortBy" class="filter-select">
    <option value="name">정렬: 자재명</option>
    <option value="code">정렬: 자재코드</option>
    <option value="category">정렬: 카테고리</option>
    <option value="location">정렬: 위치</option>
    <option value="stock">정렬: 현재고</option>
    <option value="min_stock">정렬: 최소재고</option>
    <option value="updated">정렬: 최근 입출고</option>
    <option value="status">정렬: 상태</option>
  </select>

  <select id="sortOrder" class="filter-select">
    <option value="asc">오름차순</option>
    <option value="desc">내림차순</option>
  </select>

  <button class="btn btn-outline btn-sm" onclick="loadInventory()">
    <i class="fas fa-sync"></i>
  </button>
</div>
      </div>
      <div class="card-body" style="padding:0">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
              <tr><th>자재코드</th><th>자재명</th><th>카테고리</th><th>위치</th><th>현재고</th><th>최소재고</th><th>상태</th><th>최근 입출고</th></tr>
            </thead>
            <tbody id="inventoryBody">
              <tr><td colspan="8" class="text-center"><i class="fas fa-spinner fa-spin"></i></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/common.js"></script>
<script src="js/inventory.js"></script>
</body>
</html>
