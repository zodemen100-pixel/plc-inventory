<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>바코드 스캔 - PLC 재고관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo"><i class="fas fa-microchip"></i><span class="logo-text">PLC 재고관리</span></div>
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
  </div>
  <ul class="sidebar-menu">
    <li class="menu-item"><a href="index.html"><i class="fas fa-tachometer-alt"></i><span>대시보드</span></a></li>
    <li class="menu-item"><a href="materials.html"><i class="fas fa-boxes"></i><span>자재 관리</span></a></li>
    <li class="menu-item active"><a href="scan.html"><i class="fas fa-barcode"></i><span>바코드 스캔</span></a></li>
    <li class="menu-item"><a href="transactions.html"><i class="fas fa-exchange-alt"></i><span>입출고 이력</span></a></li>
    <li class="menu-item"><a href="inventory.html"><i class="fas fa-clipboard-list"></i><span>재고 현황</span></a></li>
    <li class="menu-item"><a href="categories.html"><i class="fas fa-sitemap"></i><span>카테고리 관리</span></a></li>
    <li class="menu-item"><a href="handlers.html"><i class="fas fa-users"></i><span>담당자 관리</span></a></li>
  </ul>
  <div class="sidebar-footer"><span>v1.0.0</span></div>
</nav>
<main class="main-content" id="mainContent">
<header class="topbar">
  <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
  </button>
  <div class="topbar-title">
    <h1><i class="fas fa-barcode"></i> 바코드 스캔</h1>
  </div>
  <div class="topbar-actions">
    <span class="date-badge" id="currentDate"></span>
    <span class="date-badge" id="liveTime" style="background:#e8f4ff;border-color:#90caf9;color:#1565c0;font-weight:700;font-family:monospace;letter-spacing:.05em"></span>
  </div>
</header>
  <div class="content-area">
    <div class="scan-page-wrap">
      <div class="scan-left">
        <div class="scan-main-card">
          <div class="scan-mode-tabs">
            <button class="scan-mode-btn in active" id="btnModeIn" onclick="setMode('in')">
              <i class="fas fa-arrow-circle-down"></i> 입고
            </button>
            <button class="scan-mode-btn out" id="btnModeOut" onclick="setMode('out')">
              <i class="fas fa-arrow-circle-up"></i> 출고
            </button>
          </div>
          <div class="form-group">
            <label style="font-weight:600;font-size:.85rem">담당자 <span class="required">*</span></label>
            <select id="handlerSelect" class="form-control">
              <option value="">-- 담당자 선택 (필수) --</option>
            </select>
          </div>
          <div class="scan-input-area">
            <i class="fas fa-barcode scan-input-icon"></i>
            <input type="text" id="barcodeInput" class="scan-big-input mode-in"
              placeholder="바코드를 스캔하거나 입력하세요..."
              onkeydown="if(event.key==='Enter')processBarcode()">
          </div>
          <div class="btn-group-scan">
            <button class="btn btn-primary" onclick="startCamera()">
              <i class="fas fa-camera"></i> 카메라 스캔
            </button>
            <button class="btn btn-outline" onclick="processBarcode()">
              <i class="fas fa-search"></i> 조회
            </button>
            <button class="btn btn-outline" onclick="resetScan()">
              <i class="fas fa-redo"></i> 초기화
            </button>
          </div>
          <div class="camera-wrapper" id="cameraWrapper">
            <div class="scan-overlay-wrap">
              <div id="qr-reader"></div>
              <div class="scan-guide-box"><div class="scan-line"></div></div>
            </div>
            <button class="btn btn-danger btn-sm" style="margin:8px" onclick="stopCamera()">
              <i class="fas fa-stop"></i> 카메라 중지
            </button>
          </div>
          <div id="resultCard" class="result-card" style="display:none"></div>
        </div>
      </div>
      <div class="scan-right">
        <div class="scan-main-card">
          <div class="scan-title"><i class="fas fa-history"></i> 스캔 이력</div>
          <div id="scanHistory" class="scan-history">
            <div class="empty-state"><i class="fas fa-history"></i><p>스캔 이력이 없습니다</p></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="js/common.js"></script>
<script src="js/scan.js"></script>
<!-- ===== 새 자재 등록 모달 (스캔 페이지) ===== -->
 <div class="form-group">
  <label>카테고리</label>
  <select id="qrMatCategory" class="form-control">
    <option value="">-- 카테고리 선택 --</option>
  </select>
</div>
<div class="modal-overlay" id="scanRegisterModal">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header" style="background:linear-gradient(135deg,#1e3a5f,#2d6a9f);color:#fff;padding:18px 24px;">
      <h3 style="margin:0;font-size:16px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-plus-circle"></i> 새 자재 등록
      </h3>
      <button onclick="closeScanRegisterModal()"
        style="background:rgba(255,255,255,0.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body" style="padding:0;max-height:70vh;overflow-y:auto;">

      <div style="padding:16px 20px;border-bottom:1px solid #eee;">
        <div style="font-size:11px;font-weight:700;color:#2d6a9f;letter-spacing:1px;margin-bottom:12px;">
          <i class="fas fa-barcode"></i> 스캔된 바코드
        </div>
        <input type="text" id="srBarcode" class="form-control" readonly
               style="background:#f8f9fa;font-family:monospace;font-size:14px;"/>
      </div>

      <div style="padding:16px 20px;border-bottom:1px solid #eee;">
        <div style="font-size:11px;font-weight:700;color:#2d6a9f;letter-spacing:1px;margin-bottom:12px;">
          <i class="fas fa-info-circle"></i> 기본 정보
        </div>
        <div style="margin-bottom:12px;">
          <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">
            자재명 <span style="color:#e53e3e;">*</span>
          </label>
          <input type="text" id="srName" class="form-control" placeholder="예) SIMATIC S7-1200 CPU 1214C"/>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">모델</label>
            <input type="text" id="srModel" class="form-control" placeholder="예) CPU 1214C"/>
          </div>
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">시리즈</label>
            <input type="text" id="srSeries" class="form-control" placeholder="예) S7-1200"/>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">버전</label>
            <input type="text" id="srVersion" class="form-control" placeholder="예) V4.5"/>
          </div>
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">제조일자</label>
            <input type="date" id="srMfgDate" class="form-control"/>
          </div>
        </div>
      </div>

      <div style="padding:16px 20px;border-bottom:1px solid #eee;background:#f8f9fc;">
        <div style="font-size:11px;font-weight:700;color:#2d6a9f;letter-spacing:1px;margin-bottom:12px;">
          <i class="fas fa-cubes"></i> 재고 정보
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">현재 재고</label>
            <input type="number" id="srStock" class="form-control" value="1" min="0"/>
          </div>
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">최소 재고</label>
            <input type="number" id="srMinStock" class="form-control" value="0" min="0"/>
          </div>
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">단위</label>
            <input type="text" id="srUnit" class="form-control" value="EA"/>
          </div>
        </div>
      </div>

      <div style="padding:16px 20px;border-bottom:1px solid #eee;">
        <div style="font-size:11px;font-weight:700;color:#2d6a9f;letter-spacing:1px;margin-bottom:12px;">
          <i class="fas fa-user"></i> 담당자
        </div>
        <select id="srManager" class="form-control">
          <option value="">-- 선택 --</option>
        </select>
      </div>

      <div style="padding:16px 20px;">
        <div style="font-size:11px;font-weight:700;color:#2d6a9f;letter-spacing:1px;margin-bottom:12px;">
          <i class="fas fa-sticky-note"></i> 비고
        </div>
        <textarea id="srNote" class="form-control" rows="2" placeholder="추가 메모"></textarea>
      </div>

    </div>
    <div style="padding:14px 20px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:10px;background:#fff;">
      <button class="btn btn-outline" onclick="closeScanRegisterModal()">
        <i class="fas fa-times"></i> 취소
      </button>
      <button class="btn btn-primary" onclick="saveScanRegister()">
        <i class="fas fa-save"></i> 등록
      </button>
    </div>
  </div>
</div>
</body>
</html>
