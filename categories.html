<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>카테고리 관리 - PLC 재고관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo"><i class="fas fa-microchip"></i><span class="logo-text">PLC 재고관리</span></div>
    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
  </div>
  <ul class="sidebar-menu">
    <li class="menu-item"><a href="index.html"><i class="fas fa-tachometer-alt"></i><span>대시보드</span></a></li>
    <li class="menu-item"><a href="materials.html"><i class="fas fa-boxes"></i><span>자재 관리</span></a></li>
    <li class="menu-item"><a href="scan.html"><i class="fas fa-barcode"></i><span>바코드 스캔</span></a></li>
    <li class="menu-item"><a href="transactions.html"><i class="fas fa-exchange-alt"></i><span>입출고 이력</span></a></li>
    <li class="menu-item"><a href="inventory.html"><i class="fas fa-clipboard-list"></i><span>재고 현황</span></a></li>
    <li class="menu-item active"><a href="categories.html"><i class="fas fa-sitemap"></i><span>카테고리 관리</span></a></li>
    <li class="menu-item"><a href="handlers.html"><i class="fas fa-users"></i><span>담당자 관리</span></a></li>
  </ul>
  <div class="sidebar-footer"><span>v1.0.0</span></div>
</nav>
<main class="main-content" id="mainContent">
  <header class="topbar">
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <div class="topbar-title"><h1><i class="fas fa-sitemap"></i> 카테고리 관리</h1></div>
    <div class="topbar-actions">
      <span class="date-badge" id="currentDate"></span>
      <button class="btn btn-primary" id="addL1Btn"><i class="fas fa-plus"></i> 제조사 추가</button>
    </div>
  </header>
  <div class="content-area">
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">
      <div style="background:#fff;border-radius:10px;padding:12px 18px;box-shadow:0 1px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:10px"><i class="fas fa-industry" style="font-size:1.2rem;color:#1a1a2e"></i><div><div style="font-size:1.3rem;font-weight:700;color:#1a1a2e" id="statL1">-</div><div style="font-size:.75rem;color:#888">제조사</div></div></div>
      <div style="background:#fff;border-radius:10px;padding:12px 18px;box-shadow:0 1px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:10px"><i class="fas fa-layer-group" style="font-size:1.2rem;color:#1565c0"></i><div><div style="font-size:1.3rem;font-weight:700;color:#1a1a2e" id="statL2">-</div><div style="font-size:.75rem;color:#888">타입</div></div></div>
      <div style="background:#fff;border-radius:10px;padding:12px 18px;box-shadow:0 1px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:10px"><i class="fas fa-tag" style="font-size:1.2rem;color:#2e7d32"></i><div><div style="font-size:1.3rem;font-weight:700;color:#1a1a2e" id="statL3">-</div><div style="font-size:.75rem;color:#888">모델</div></div></div>
      <div style="background:#fff;border-radius:10px;padding:12px 18px;box-shadow:0 1px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:10px"><i class="fas fa-boxes" style="font-size:1.2rem;color:#e65100"></i><div><div style="font-size:1.3rem;font-weight:700;color:#1a1a2e" id="statMats">-</div><div style="font-size:.75rem;color:#888">등록 자재</div></div></div>
    </div>
    <div style="background:#e3f2fd;border:1px solid #90caf9;border-radius:10px;padding:12px 18px;margin-bottom:20px;font-size:.85rem;color:#1565c0;display:flex;align-items:center;gap:10px">
      <i class="fas fa-info-circle" style="font-size:1.1rem;flex-shrink:0"></i>
      <span>카테고리 구조: <strong>제조사(L1) → 타입(L2) → 모델(L3)</strong> &nbsp;|&nbsp; 예: <strong>AB → DIGITAL INPUT → 1756-IB32</strong></span>
    </div>
    <div class="card">
      <div class="card-header">
        <h2><i class="fas fa-sitemap text-primary"></i> 카테고리 트리</h2>
        <input type="text" id="catSearch" class="search-input" placeholder="카테고리 검색..." style="width:200px">
      </div>
      <div class="card-body">
        <div class="cat-tree" id="catTree"><div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> 로딩 중...</div></div>
      </div>
    </div>
  </div>
</main>

<!-- 카테고리 편집 모달 -->
<div class="modal-overlay" id="catModal">
  <div class="modal" style="max-width:440px">
    <div class="modal-header"><h3 id="catModalTitle"><i class="fas fa-folder-plus"></i> 카테고리 추가</h3><button class="modal-close" id="closeCatModal"><i class="fas fa-times"></i></button></div>
    <div class="modal-body">
      <div style="margin-bottom:14px"><span class="level-indicator" id="levelIndicator"><i class="fas fa-industry"></i> 레벨 1 — 제조사</span></div>
      <div id="parentPathArea" style="display:none;background:#f8f9fa;border-radius:8px;padding:10px 14px;font-size:.83rem;color:#555;margin-bottom:14px"><i class="fas fa-sitemap" style="color:#888"></i> 상위: <strong id="parentPathText"></strong></div>
      <div class="form-group"><label>카테고리명 <span class="required">*</span></label><input type="text" id="catName" class="form-control" placeholder="예) AB / DIGITAL INPUT / 1756-IB32"></div>
      <div class="form-group"><label>설명 (선택)</label><input type="text" id="catDesc" class="form-control" placeholder="간단한 설명"></div>
      <div class="form-group"><label>정렬 순서</label><input type="number" id="catOrder" class="form-control" value="0" min="0"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" id="cancelCatModal" style="color:#666;border-color:#ddd">취소</button>
      <button class="btn btn-primary" id="saveCatBtn"><i class="fas fa-save"></i> 저장</button>
    </div>
  </div>
</div>

<!-- 카테고리 삭제 모달 -->
<div class="modal-overlay" id="catDeleteModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header"><h3 style="color:#f44336"><i class="fas fa-exclamation-triangle"></i> 카테고리 삭제</h3><button class="modal-close" id="closeCatDeleteModal"><i class="fas fa-times"></i></button></div>
    <div class="modal-body" style="text-align:center;padding:28px">
      <i class="fas fa-trash-alt" style="font-size:2.8rem;color:#ffcccc;display:block;margin-bottom:14px"></i>
      <p id="catDeleteText" style="font-size:1rem;color:#333;margin-bottom:8px"></p>
      <p style="color:#888;font-size:.85rem">하위 카테고리도 모두 삭제됩니다.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" id="cancelCatDelete" style="color:#666;border-color:#ddd">취소</button>
      <button class="btn btn-danger" id="confirmCatDelete"><i class="fas fa-trash"></i> 삭제</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/common.js"></script>
<script src="js/categories.js"></script>
</body>
</html>
