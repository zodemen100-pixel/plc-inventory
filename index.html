<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>대시보드 - PLC 재고관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <i class="fas fa-microchip"></i>
      <span class="logo-text">PLC 재고관리</span>
    </div>
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
      <i class="fas fa-bars"></i>
    </button>
  </div>
  <ul class="sidebar-menu">
    <li class="menu-item active"><a href="index.html"><i class="fas fa-tachometer-alt"></i><span>대시보드</span></a></li>
    <li class="menu-item"><a href="materials.html"><i class="fas fa-boxes"></i><span>자재 관리</span></a></li>
    <li class="menu-item"><a href="scan.html"><i class="fas fa-barcode"></i><span>바코드 스캔</span></a></li>
    <li class="menu-item"><a href="transactions.html"><i class="fas fa-exchange-alt"></i><span>입출고 이력</span></a></li>
    <li class="menu-item"><a href="inventory.html"><i class="fas fa-clipboard-list"></i><span>재고 현황</span></a></li>
    <li class="menu-item"><a href="categories.html"><i class="fas fa-sitemap"></i><span>카테고리 관리</span></a></li>
    <li class="menu-item"><a href="handlers.html"><i class="fas fa-users"></i><span>담당자 관리</span></a></li>
  </ul>
  <div class="sidebar-footer"><span>v1.0.0</span></div>
</nav>

<main class="main-content" id="mainContent">
  <header class="topbar">
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
      <i class="fas fa-bars"></i>
    </button>
    <div class="topbar-title">
      <h1><i class="fas fa-tachometer-alt"></i> 대시보드</h1>
    </div>
    <div class="topbar-actions">
      <span class="date-badge" id="currentDate"></span>
      <a href="scan.html" class="btn btn-primary">
        <i class="fas fa-barcode"></i> 바코드 스캔
      </a>
    </div>
  </header>

  <div class="content-area">
    <!-- 통계 카드 -->
    <div class="stats-grid">
      <div class="stat-card stat-total">
        <div class="stat-icon"><i class="fas fa-boxes"></i></div>
        <div class="stat-info"><h3 id="totalMaterials">-</h3><p>전체 자재 종류</p></div>
      </div>
      <div class="stat-card stat-in">
        <div class="stat-icon"><i class="fas fa-arrow-circle-down"></i></div>
        <div class="stat-info"><h3 id="todayIn">-</h3><p>오늘 입고 건수</p></div>
      </div>
      <div class="stat-card stat-out">
        <div class="stat-icon"><i class="fas fa-arrow-circle-up"></i></div>
        <div class="stat-info"><h3 id="todayOut">-</h3><p>오늘 출고 건수</p></div>
      </div>
      <div class="stat-card stat-warning">
        <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="stat-info"><h3 id="lowStock">-</h3><p>재고 부족 자재</p></div>
      </div>
    </div>

    <!-- 대시보드 그리드 -->
    <div class="dashboard-grid">
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-exclamation-triangle text-warning"></i> 재고 부족 경고</h2>
          <a href="inventory.html" class="btn-link">전체 보기 →</a>
        </div>
        <div class="card-body">
          <div id="lowStockList" class="alert-list">
            <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <h2><i class="fas fa-history text-primary"></i> 최근 입출고 이력</h2>
          <a href="transactions.html" class="btn-link">전체 보기 →</a>
        </div>
        <div class="card-body">
          <div id="recentTransactions" class="transaction-list">
            <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 전체 재고 현황 -->
    <div class="card">
      <div class="card-header">
        <h2><i class="fas fa-clipboard-list text-success"></i> 전체 재고 현황</h2>
        <div class="card-actions">
          <input type="text" id="searchInput" placeholder="자재명 검색..." class="search-input">
          <button class="btn btn-success btn-sm" onclick="location.href='materials.html'">
            <i class="fas fa-plus"></i> 자재 등록
          </button>
        </div>
      </div>
      <div class="card-body" style="padding:0">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
              <tr>
                <th>자재코드</th>
                <th>자재명</th>
                <th>카테고리</th>
                <th>위치</th>
                <th>현재 재고</th>
                <th>최소 재고</th>
                <th>상태</th>
                <th>작업</th>
              </tr>
            </thead>
            <tbody id="materialsTableBody">
              <tr><td colspan="8" class="text-center">
                <i class="fas fa-spinner fa-spin"></i>
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/common.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
