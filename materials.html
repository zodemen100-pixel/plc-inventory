<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>자재 관리 | PLC 재고관리</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="app-layout">

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <i class="fas fa-microchip"></i>
      <span>PLC 재고관리</span>
    </div>
    <ul class="sidebar-menu">
      <li class="menu-item"><a href="index.html"><i class="fas fa-tachometer-alt"></i><span>대시보드</span></a></li>
      <li class="menu-item active"><a href="materials.html"><i class="fas fa-boxes"></i><span>자재 관리</span></a></li>
      <li class="menu-item"><a href="scan.html"><i class="fas fa-barcode"></i><span>바코드 스캔</span></a></li>
      <li class="menu-item"><a href="transactions.html"><i class="fas fa-exchange-alt"></i><span>입출고 이력</span></a></li>
      <li class="menu-item"><a href="inventory.html"><i class="fas fa-warehouse"></i><span>재고 현황</span></a></li>
      <li class="menu-item"><a href="categories.html"><i class="fas fa-sitemap"></i><span>카테고리 관리</span></a></li>
      <li class="menu-item"><a href="handlers.html"><i class="fas fa-users"></i><span>담당자 관리</span></a></li>
    </ul>
    <div class="sidebar-footer">v1.0.0</div>
  </nav>

  <div class="main-content" id="mainContent">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
      <div class="topbar-left">
        <h1 class="page-title">자재 관리</h1>
      </div>
      <div class="topbar-actions">
        <span class="date-badge" id="currentDate"></span>
        <span class="date-badge" id="liveTime"></span>
      </div>
    </header>

    <div class="page-content">
      <div class="filter-bar">
        <div class="search-wrap">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="자재명, 모델, 시리즈, 버전 검색..."/>
        </div>
        <select id="filterCategory" class="form-select" onchange="applyFilter()">
          <option value="">전체 카테고리</option>
        </select>
        <select id="filterStatus" class="form-select" onchange="applyFilter()">
          <option value="">전체 상태</option>
          <option value="normal">정상</option>
          <option value="low">부족</option>
          <option value="out">재고없음</option>
        </select>
        <button class="btn btn-primary" onclick="openModal()">
          <i class="fas fa-plus"></i> 자재 등록
        </button>
      </div>

      <div class="card">
        <div class="card-header">
          <h3 class="card-title"><i class="fas fa-list"></i> 자재 목록</h3>
          <span class="badge" id="totalCount">0건</span>
        </div>
        <div class="card-body p-0">
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>자재명</th>
                  <th>모델</th>
                  <th>시리즈</th>
                  <th>버전</th>
                  <th>카테고리</th>
                  <th>담당자</th>
                  <th>재고</th>
                  <th>상태</th>
                  <th>작업</th>
                </tr>
              </thead>
              <tbody id="materialsTableBody">
                <tr><td colspan="9" class="text-center">
                  <i class="fas fa-spinner fa-spin"></i> 불러오는 중...
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 자재 등록/수정 모달 ===== -->
<div class="modal-overlay" id="materialModal">
  <div class="modal" style="max-width:600px;border-radius:16px;overflow:hidden;">

    <div class="modal-header" style="background:linear-gradient(135deg,#1e3a5f,#2d6a9f);color:#fff;padding:18px 24px;">
      <h3 id="modalTitle" style="margin:0;font-size:16px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-plus-circle"></i> 자재 등록
      </h3>
      <button onclick="closeModal()"
        style="background:rgba(255,255,255,0.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="modal-body" style="padding:0;max-height:70vh;overflow-y:auto;">
      <input type="hidden" id="matId"/>

      <!-- 기본 정보 -->
      <div style="padding:18px 24px;border-bottom:1px solid #eee;">
        <div style="font-size:11px;font-weight:700;color:#2d6a9f;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;">
          <i class="fas fa-info-circle"></i> 기본 정보
        </div>
        <div style="margin-bottom:12px;">
          <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">
            자재명 <span style="color:#e53e3e;">*</span>
          </label>
          <input type="text" class="form-control" id="matName" placeholder="예) SIMATIC S7-1200 CPU 1214C"/>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">모델</label>
            <input type="text" class="form-control" id="matModel" placeholder="예) CPU 1214C"/>
          </div>
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">시리즈</label>
            <input type="text" class="form-control" id="matSeries" placeholder="예) S7-1200"/>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">버전</label>
            <input type="text" class="form-control" id="matVersion" placeholder="예) V4.5"/>
          </div>
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">제조일자</label>
            <input type="date" class="form-control" id="matMfgDate"/>
          </div>
        </div>
      </div>

      <!-- 분류 / 담당 -->
      <div style="padding:18px 24px;border-bottom:1px solid #eee;background:#f8f9fa;">
        <div style="font-size:11px;font-weight:700;color:#2d6a9f;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;">
          <i class="fas fa-tag"></i> 분류 / 담당
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">카테고리</label>
            <select class="form-control" id="matCategory">
              <option value="">-- 선택 --</option>
            </select>
          </div>
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">담당자</label>
            <select class="form-control" id="matManager">
              <option value="">-- 선택 --</option>
            </select>
          </div>
        </div>
      </div>

      <!-- 재고 정보 -->
      <div style="padding:18px 24px;border-bottom:1px solid #eee;">
        <div style="font-size:11px;font-weight:700;color:#2d6a9f;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;">
          <i class="fas fa-cubes"></i> 재고 정보
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">현재 재고</label>
            <input type="number" class="form-control" id="matStock" value="0" min="0"/>
          </div>
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">최소 재고</label>
            <input type="number" class="form-control" id="matMinStock" value="0" min="0"/>
          </div>
          <div>
            <label style="display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">단위</label>
            <input type="text" class="form-control" id="matUnit" value="EA"/>
          </div>
        </div>
      </div>

      <!-- 바코드 -->
      <div style="padding:18px 24px;border-bottom:1px solid #eee;background:#f8f9fa;">
        <div style="font-size:11px;font-weight:700;color:#2d6a9f;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;">
          <i class="fas fa-barcode"></i> 바코드
        </div>
        <div style="display:flex;gap:8px;">
          <input type="text" class="form-control" id="matBarcode" placeholder="자동생성 또는 직접입력" style="flex:1;"/>
          <button type="button" class="btn btn-outline" onclick="genBarcode()" style="white-space:nowrap;">
            <i class="fas fa-sync-alt"></i> 자동생성
          </button>
        </div>
      </div>

      <!-- 비고 -->
      <div style="padding:18px 24px;">
        <div style="font-size:11px;font-weight:700;color:#2d6a9f;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;">
          <i class="fas fa-sticky-note"></i> 비고
        </div>
        <textarea class="form-control" id="matNote" rows="2" placeholder="추가 메모 사항" style="resize:vertical;"></textarea>
      </div>

    </div>

    <div class="modal-footer" style="padding:14px 24px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:10px;">
      <button class="btn btn-outline" onclick="closeModal()">
        <i class="fas fa-times"></i> 취소
      </button>
      <button class="btn btn-primary" onclick="saveMaterial()">
        <i class="fas fa-save"></i> 저장
      </button>
    </div>

  </div>
</div>

<!-- 바코드 미리보기 모달 -->
<div class="modal-overlay" id="barcodeModal">
  <div class="modal" style="max-width:400px;text-align:center;">
    <div class="modal-header">
      <h3><i class="fas fa-barcode"></i> 바코드 미리보기</h3>
      <button class="modal-close" onclick="closeBarcode()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <p id="bcMatName" style="font-weight:600;font-size:15px;margin-bottom:16px;"></p>
      <svg id="bcSvg"></svg>
      <p id="bcValue" style="margin-top:10px;font-size:13px;color:#888;"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeBarcode()">닫기</button>
      <button class="btn btn-primary" onclick="printBarcode()">
        <i class="fas fa-print"></i> 인쇄
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="js/common.js"></script>
<script src="js/materials.js"></script>
</body>
</html>
