<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>자재 관리 - PLC 재고관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo"><i class="fas fa-microchip"></i><span class="logo-text">PLC 재고관리</span></div>
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
  </div>
  <ul class="sidebar-menu">
    <li class="menu-item"><a href="index.html"><i class="fas fa-tachometer-alt"></i><span>대시보드</span></a></li>
    <li class="menu-item active"><a href="materials.html"><i class="fas fa-boxes"></i><span>자재 관리</span></a></li>
    <li class="menu-item"><a href="scan.html"><i class="fas fa-barcode"></i><span>바코드 스캔</span></a></li>
    <li class="menu-item"><a href="transactions.html"><i class="fas fa-exchange-alt"></i><span>입출고 이력</span></a></li>
    <li class="menu-item"><a href="inventory.html"><i class="fas fa-clipboard-list"></i><span>재고 현황</span></a></li>
    <li class="menu-item"><a href="categories.html"><i class="fas fa-sitemap"></i><span>카테고리 관리</span></a></li>
    <li class="menu-item"><a href="handlers.html"><i class="fas fa-users"></i><span>담당자 관리</span></a></li>
  </ul>
  <div class="sidebar-footer"><span>v1.0.0</span></div>
</nav>
<main class="main-content" id="mainContent">
  <header class="topbar">
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="topbar-title"><h1><i class="fas fa-boxes"></i> 자재 관리</h1></div>
    <div class="topbar-actions">
      <span class="date-badge" id="currentDate"></span>
      <button class="btn btn-success" onclick="openAddModal()"><i class="fas fa-plus"></i> 자재 등록</button>
    </div>
  </header>
  <div class="content-area">
    <div class="card">
      <div class="card-header">
        <h2><i class="fas fa-boxes"></i> 자재 목록</h2>
        <div class="card-actions">
          <input type="text" id="searchInput" placeholder="자재명, 모델명 검색..." class="search-input">
          <select id="filterCategory" class="filter-select"><option value="">전체 카테고리</option></select>
          <button class="btn btn-outline btn-sm" onclick="loadMaterials()"><i class="fas fa-sync"></i></button>
        </div>
      </div>
      <div class="card-body" style="padding:0">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
              <tr>
                <th>바코드</th><th>자재명</th><th>모델명</th><th>카테고리</th>
                <th>위치</th><th>현재고</th><th>최소재고</th><th>상태</th><th>작업</th>
              </tr>
            </thead>
            <tbody id="materialsBody">
              <tr><td colspan="9" class="text-center"><i class="fas fa-spinner fa-spin"></i></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>
<button class="btn btn-outline btn-sm" onclick="openLabelModal('${m.id}')">
  <i class="fas fa-print"></i>
</button>
<!-- 자재 등록/수정 모달 -->
<div class="modal-overlay" id="materialModal">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <h3 id="modalTitle"><i class="fas fa-plus"></i> 자재 등록</h3>
      <button class="modal-close" onclick="closeOverlay('materialModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="matId">
      <div class="form-row">
        <div class="form-group">
          <label>자재코드 <span class="required">*</span></label>
          <input type="text" id="matCode" class="form-control" placeholder="예: AB-001">
        </div>
        <div class="form-group">
          <label>자재명 <span class="required">*</span></label>
          <input type="text" id="matName" class="form-control" placeholder="예: 서보 드라이버">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>모델명</label>
          <input type="text" id="matModel" class="form-control" placeholder="예: 1756-IB32">
        </div>
        <div class="form-group">
          <label>버전</label>
          <input type="text" id="matVersion" class="form-control" placeholder="예: v2.1">
        </div>
      </div>
      <div class="form-group">
        <label>카테고리</label>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          <select id="catL1" class="form-control" onchange="onCatL1Change()"><option value="">제조사 선택</option></select>
          <select id="catL2" class="form-control" onchange="onCatL2Change()" disabled><option value="">유형 선택</option></select>
          <select id="catL3" class="form-control" disabled><option value="">모델 선택</option></select>
        </div>
        <div id="catPreview" style="margin-top:6px;font-size:.8rem;color:#666"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>위치</label>
          <input type="text" id="matLocation" class="form-control" placeholder="예: A-1-1">
        </div>
        <div class="form-group">
          <label>단위</label>
          <select id="matUnit" class="form-control">
            <option value="EA">EA</option><option value="개">개</option>
            <option value="SET">SET</option><option value="BOX">BOX</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>현재 재고</label>
          <input type="number" id="matStock" class="form-control" value="0" min="0">
        </div>
        <div class="form-group">
          <label>최소 재고</label>
          <input type="number" id="matMinStock" class="form-control" value="1" min="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>제조일자</label>
          <input type="date" id="matMfgDate" class="form-control">
        </div>
        <div class="form-group">
          <label>담당자</label>
          <input type="text" id="matManager" class="form-control" placeholder="예: 홍길동">
        </div>
      </div>
      <div class="form-group">
        <label>바코드</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="matBarcode" class="form-control" placeholder="자동생성 또는 직접입력">
          <button class="btn btn-outline btn-sm" onclick="generateBarcode()" style="white-space:nowrap">
            <i class="fas fa-barcode"></i> 생성
          </button>
        </div>
        <div id="barcodePreview" style="margin-top:10px;text-align:center"></div>
      </div>
      <div class="form-group">
        <label>비고</label>
        <textarea id="matNote" class="form-control" rows="2" placeholder="추가 메모"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeOverlay('materialModal')">취소</button>
      <button class="btn btn-success" onclick="saveMaterial()"><i class="fas fa-save"></i> 저장</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h3><i class="fas fa-trash"></i> 자재 삭제</h3>
      <button class="modal-close" onclick="closeOverlay('deleteModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <p id="deleteMsg" style="text-align:center;padding:20px 0;font-size:.95rem"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeOverlay('deleteModal')">취소</button>
      <button class="btn btn-danger" onclick="confirmDelete()"><i class="fas fa-trash"></i> 삭제</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="js/common.js"></script>
<script src="js/materials.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="js/common.js"></script>
<script src="js/excel.js"></script>
<script src="js/label.js"></script>
<script src="js/manual_tx.js"></script>
<script src="js/materials.js"></script>
</body>
</html>
