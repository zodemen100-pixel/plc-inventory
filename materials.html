<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>자재 관리 | PLC 재고관리</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="app-layout">

  <!-- 사이드바 -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <i class="fas fa-microchip"></i>
      <span>PLC 재고관리</span>
    </div>
    <ul class="sidebar-menu">
      <li class="menu-item"><a href="index.html"><i class="fas fa-tachometer-alt"></i><span>대시보드</span></a></li>
      <li class="menu-item active"><a href="materials.html"><i class="fas fa-boxes"></i><span>자재 관리</span></a></li>
      <li class="menu-item"><a href="scan.html"><i class="fas fa-barcode"></i><span>바코드 스캔</span></a></li>
      <li class="menu-item"><a href="transactions.html"><i class="fas fa-exchange-alt"></i><span>입출고 이력</span></a></li>
      <li class="menu-item"><a href="inventory.html"><i class="fas fa-warehouse"></i><span>재고 현황</span></a></li>
      <li class="menu-item"><a href="categories.html"><i class="fas fa-sitemap"></i><span>카테고리 관리</span></a></li>
      <li class="menu-item"><a href="handlers.html"><i class="fas fa-users"></i><span>담당자 관리</span></a></li>
    </ul>
    <div class="sidebar-footer">v1.0.0</div>
  </nav>

  <!-- 메인 -->
  <div class="main-content" id="mainContent">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
      <h1 class="page-title"><i class="fas fa-boxes"></i> 자재 관리</h1>
      <div class="topbar-actions">
        <span class="date-badge" id="currentDate"></span>
        <span class="date-badge" id="liveTime"></span>
      </div>
    </header>

    <div class="page-content">

      <!-- 검색 + 등록 버튼 -->
      <div class="toolbar">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="자재명, 모델, 시리즈 검색..."/>
        </div>
        <button class="btn btn-primary" onclick="openModal()">
          <i class="fas fa-plus"></i> 자재 등록
        </button>
      </div>

      <!-- 자재 목록 테이블 -->
      <div class="card">
        <div class="card-body">
          <table class="table" id="materialsTable">
            <thead>
              <tr>
                <th>자재명</th>
                <th>모델</th>
                <th>시리즈</th>
                <th>버전</th>
                <th>카테고리</th>
                <th>재고</th>
                <th>상태</th>
                <th>작업</th>
              </tr>
            </thead>
            <tbody id="materialsTableBody">
              <tr><td colspan="8" class="text-center"><i class="fas fa-spinner fa-spin"></i> 불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ===== 자재 등록/수정 모달 ===== -->
<div class="modal-overlay" id="materialModal" onclick="handleOverlayClick(event,'materialModal')">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <h3 id="modalTitle"><i class="fas fa-plus-circle"></i> 자재 등록</h3>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <form id="materialForm">
        <input type="hidden" id="matId"/>

        <!-- 자재명 -->
        <div class="form-group">
          <label class="form-label required">자재명</label>
          <input type="text" class="form-control" id="matName" placeholder="예) SIMATIC S7-1200" required/>
        </div>

        <!-- 모델 / 시리즈 -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">모델</label>
            <input type="text" class="form-control" id="matModel" placeholder="예) CPU 1214C"/>
          </div>
          <div class="form-group">
            <label class="form-label">시리즈</label>
            <input type="text" class="form-control" id="matSeries" placeholder="예) S7-1200"/>
          </div>
        </div>

        <!-- 버전 / 제조일자 -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">버전</label>
            <input type="text" class="form-control" id="matVersion" placeholder="예) V4.5"/>
          </div>
          <div class="form-group">
            <label class="form-label">제조일자</label>
            <input type="date" class="form-control" id="matMfgDate"/>
          </div>
        </div>

        <!-- 카테고리 -->
        <div class="form-group">
          <label class="form-label">카테고리</label>
          <select class="form-control" id="matCategory">
            <option value="">-- 선택 --</option>
          </select>
        </div>

        <!-- 현재재고 / 최소재고 -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">현재 재고</label>
            <input type="number" class="form-control" id="matStock" value="0" min="0"/>
          </div>
          <div class="form-group">
            <label class="form-label">최소 재고</label>
            <input type="number" class="form-control" id="matMinStock" value="0" min="0"/>
          </div>
        </div>

        <!-- 단위 / 담당자 -->
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">단위</label>
            <input type="text" class="form-control" id="matUnit" placeholder="EA" value="EA"/>
          </div>
          <div class="form-group">
            <label class="form-label">담당자</label>
            <select class="form-control" id="matManager">
              <option value="">-- 선택 --</option>
            </select>
          </div>
        </div>

        <!-- 바코드 -->
        <div class="form-group">
          <label class="form-label">바코드</label>
          <div class="input-group">
            <input type="text" class="form-control" id="matBarcode" placeholder="자동생성 또는 직접입력"/>
            <button type="button" class="btn btn-outline" onclick="genBarcode()">
              <i class="fas fa-sync-alt"></i> 자동생성
            </button>
          </div>
        </div>

        <!-- 비고 -->
        <div class="form-group">
          <label class="form-label">비고</label>
          <textarea class="form-control" id="matNote" rows="2" placeholder="추가 메모"></textarea>
        </div>

      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveMaterial()">
        <i class="fas fa-save"></i> 저장
      </button>
    </div>
  </div>
</div>

<!-- 바코드 미리보기 모달 -->
<div class="modal-overlay" id="barcodeModal" onclick="handleOverlayClick(event,'barcodeModal')">
  <div class="modal" style="max-width:380px;text-align:center;">
    <div class="modal-header">
      <h3><i class="fas fa-barcode"></i> 바코드</h3>
      <button class="modal-close" onclick="closeBarcode()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <p id="bcMatName" style="font-weight:600;margin-bottom:12px;"></p>
      <svg id="bcSvg"></svg>
      <p id="bcValue" style="margin-top:8px;font-size:13px;color:#666;"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeBarcode()">닫기</button>
      <button class="btn btn-primary" onclick="printBarcode()"><i class="fas fa-print"></i> 인쇄</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="js/common.js"></script>
<script src="js/materials.js"></script>
</body>
</html>
