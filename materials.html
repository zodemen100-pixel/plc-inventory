<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>자재 관리 | PLC 재고관리</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* 자재관리 페이지 전용 */
    .page-content { padding: 24px; }

    .filter-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-bar .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .filter-bar .search-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
    }
    .filter-bar .search-wrap input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
    }
    .filter-bar .search-wrap input:focus { border-color: var(--primary); }
    .filter-bar select {
      padding: 9px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      background: #fff;
      outline: none;
      cursor: pointer;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: #333;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      background: var(--primary);
      color: #fff;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .table-wrap { overflow-x: auto; }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .table th {
      background: #f8f9fa;
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      color: #555;
      border-bottom: 2px solid #eee;
      white-space: nowrap;
    }
    .table td {
      padding: 12px 16px;
      border-bottom: 1px solid #f5f5f5;
      vertical-align: middle;
    }
    .table tr:hover td { background: #f9fbff; }
    .table tr:last-child td { border-bottom: none; }

    .btn-group { display: flex; gap: 6px; }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 620px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: linear-gradient(135deg, #1e3a5f, #2d6a9f);
      color: #fff;
      flex-shrink: 0;
    }
    .modal-header h3 {
      margin: 0;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .modal-close-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-body {
      overflow-y: auto;
      flex: 1;
      padding: 0;
    }
    .modal-footer {
      padding: 14px 24px;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-shrink: 0;
      background: #fff;
    }

    /* 모달 섹션 */
    .msec {
      padding: 18px 24px;
      border-bottom: 1px solid #eee;
    }
    .msec:last-child { border-bottom: none; }
    .msec.bg { background: #f8f9fc; }
    .msec-title {
      font-size: 11px;
      font-weight: 700;
      color: #2d6a9f;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .msec label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 5px;
    }
    .msec label .req { color: #e53e3e; }
    .msec .form-control {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      box-sizing: border-box;
      transition: border-color .2s;
    }
    .msec .form-control:focus { border-color: #2d6a9f; }
    .msec .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .msec .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .msec .row { margin-bottom: 12px; }
    .msec .row:last-child { margin-bottom: 0; }
    .msec .flex-row { display: flex; gap: 8px; align-items: center; }
    .msec .flex-row .form-control { flex: 1; }

    /* 카테고리 선택 - 3단계 */
    .cat-select-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .cat-select-wrap select {
      padding: 9px 8px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      background: #fff;
      outline: none;
      width: 100%;
      box-sizing: border-box;
    }
    .cat-select-wrap select:focus { border-color: #2d6a9f; }
    .cat-label {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-top: 4px;
    }

    @media (max-width: 600px) {
      .msec .grid2 { grid-template-columns: 1fr; }
      .msec .grid3 { grid-template-columns: 1fr 1fr; }
      .cat-select-wrap { grid-template-columns: 1fr; }
    }
    /* 꽉 찬 레이아웃 */
.app-layout { min-height: 100vh; }
.main-content { width: 100%; min-width: 0; }
.page-content { padding: 20px 28px; width: 100%; box-sizing: border-box; }
.card { width: 100%; }
.filter-bar { width: 100%; }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="app-layout">

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <i class="fas fa-microchip"></i>
      <span>PLC 재고관리</span>
    </div>
    <ul class="sidebar-menu">
      <li class="menu-item"><a href="index.html"><i class="fas fa-tachometer-alt"></i><span>대시보드</span></a></li>
      <li class="menu-item active"><a href="materials.html"><i class="fas fa-boxes"></i><span>자재 관리</span></a></li>
      <li class="menu-item"><a href="scan.html"><i class="fas fa-barcode"></i><span>바코드 스캔</span></a></li>
      <li class="menu-item"><a href="transactions.html"><i class="fas fa-exchange-alt"></i><span>입출고 이력</span></a></li>
      <li class="menu-item"><a href="inventory.html"><i class="fas fa-warehouse"></i><span>재고 현황</span></a></li>
      <li class="menu-item"><a href="categories.html"><i class="fas fa-sitemap"></i><span>카테고리 관리</span></a></li>
      <li class="menu-item"><a href="handlers.html"><i class="fas fa-users"></i><span>담당자 관리</span></a></li>
    </ul>
    <div class="sidebar-footer">v1.0.0</div>
  </nav>

  <div class="main-content" id="mainContent">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
      <div class="topbar-left">
        <h1 class="page-title">자재 관리</h1>
      </div>
      <div class="topbar-actions">
        <span class="date-badge" id="currentDate"></span>
        <span class="date-badge" id="liveTime"></span>
      </div>
    </header>

    <div class="page-content">

<!-- 필터 바 -->
<div class="filter-bar">
  <div class="search-wrap">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="자재명, 모델, 시리즈, 버전 검색..."/>
  </div>

  <select id="filterCategory" onchange="applyFilter()">
    <option value="">전체 카테고리</option>
  </select>

  <select id="filterStatus" onchange="applyFilter()">
    <option value="">전체 상태</option>
    <option value="ok">정상</option>
    <option value="low">부족</option>
    <option value="critical">재고없음</option>
  </select>

  <select id="sortBy" onchange="applyFilter()">
    <option value="name">정렬: 자재명</option>
    <option value="code">정렬: 자재코드</option>
    <option value="category">정렬: 카테고리</option>
    <option value="manager">정렬: 담당자</option>
    <option value="stock">정렬: 현재재고</option>
    <option value="updated">정렬: 최근수정</option>
  </select>

  <select id="sortOrder" onchange="applyFilter()">
    <option value="asc">오름차순</option>
    <option value="desc">내림차순</option>
  </select>

  <button class="btn btn-primary" onclick="openModal()">
    <i class="fas fa-plus"></i> 자재 등록
  </button>
</div>
<div id="bulkActionBar" style="display:none;margin:-8px 0 16px 0;padding:12px 14px;background:#eef6ff;border:1px solid #bfdbfe;border-radius:10px;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
  <div style="font-size:13px;color:#1e3a5f;font-weight:600">
    선택된 자재 <span id="selectedCount">0</span>건
  </div>

  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-outline btn-sm" onclick="clearSelection()">
      <i class="fas fa-times-circle"></i> 선택 해제
    </button>
    <button class="btn btn-primary btn-sm" onclick="openBulkEditModal()">
      <i class="fas fa-pen"></i> 선택 항목 일괄수정
    </button>
  </div>

</div>
      <!-- 자재 목록 -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title"><i class="fas fa-list"></i> 자재 목록</h3>
          <span class="badge" id="totalCount">0건</span>
        </div>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
  <th style="width:44px;text-align:center">
    <input type="checkbox" id="checkAllMaterials" onchange="toggleSelectAll(this.checked)">
  </th>
  <th>자재명</th>
  <th>모델</th>
  <th>시리즈</th>
  <th>버전</th>
  <th>카테고리</th>
  <th>담당자</th>
  <th>재고</th>
  <th>상태</th>
  <th>작업</th>
</tr>
            </thead>
            <tbody id="materialsTableBody">
              <tr><td colspan="10" style="text-align:center;padding:40px;color:#888;">
  <i class="fas fa-spinner fa-spin"></i> 불러오는 중...
</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ===== 자재 등록/수정 모달 ===== -->
<div class="modal-overlay" id="materialModal">
  <div class="modal">

    <div class="modal-header">
      <h3 id="modalTitle"><i class="fas fa-plus-circle"></i> 자재 등록</h3>
      <button class="modal-close-btn" onclick="closeModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="modal-body">
      <input type="hidden" id="matId"/>

      <!-- 기본 정보 -->
      <div class="msec">
        <div class="msec-title"><i class="fas fa-info-circle"></i> 기본 정보</div>
        <div class="row">
          <label>자재명 <span class="req">*</span></label>
          <input type="text" class="form-control" id="matName" placeholder="예) SIMATIC S7-1200 CPU 1214C"/>
        </div>
        <div class="grid2 row">
          <div>
            <label>모델</label>
            <input type="text" class="form-control" id="matModel" placeholder="예) CPU 1214C"/>
          </div>
          <div>
            <label>시리즈</label>
            <input type="text" class="form-control" id="matSeries" placeholder="예) S7-1200"/>
          </div>
        </div>
        <div class="grid2">
          <div>
            <label>버전</label>
            <input type="text" class="form-control" id="matVersion" placeholder="예) V4.5"/>
          </div>
          <div>
            <label>제조일자</label>
            <input type="date" class="form-control" id="matMfgDate"/>
          </div>
        </div>
      </div>

      <!-- 카테고리 3단계 -->
      <div class="msec bg">
        <div class="msec-title"><i class="fas fa-sitemap"></i> 카테고리</div>
        <div class="cat-select-wrap">
          <div>
            <select id="catL1" onchange="onCatL1Change()">
              <option value="">대분류</option>
            </select>
            <div class="cat-label">대분류</div>
          </div>
          <div>
            <select id="catL2" onchange="onCatL2Change()" disabled>
              <option value="">중분류</option>
            </select>
            <div class="cat-label">중분류</div>
          </div>
          <div>
            <select id="catL3" onchange="onCatL3Change()" disabled>
              <option value="">소분류</option>
            </select>
            <div class="cat-label">소분류</div>
          </div>
        </div>
        <input type="hidden" id="matCategory"/>
      </div>

      <!-- 담당자 -->
      <div class="msec">
        <div class="msec-title"><i class="fas fa-user"></i> 담당자</div>
        <select class="form-control" id="matManager">
          <option value="">-- 선택 --</option>
        </select>
      </div>

      <!-- 재고 정보 -->
      <div class="msec bg">
        <div class="msec-title"><i class="fas fa-cubes"></i> 재고 정보</div>
        <div class="grid3">
          <div>
            <label>현재 재고</label>
            <input type="number" class="form-control" id="matStock" value="0" min="0"/>
          </div>
          <div>
            <label>최소 재고</label>
            <input type="number" class="form-control" id="matMinStock" value="0" min="0"/>
          </div>
          <div>
            <label>단위</label>
            <input type="text" class="form-control" id="matUnit" value="EA"/>
          </div>
        </div>
      </div>

      <!-- 바코드 -->
      <div class="msec">
        <div class="msec-title"><i class="fas fa-barcode"></i> 바코드</div>
        <div class="flex-row">
          <input type="text" class="form-control" id="matBarcode" placeholder="자동생성 또는 직접입력"/>
          <button type="button" class="btn btn-outline" onclick="genBarcode()" style="white-space:nowrap;">
            <i class="fas fa-sync-alt"></i> 자동생성
          </button>
        </div>
      </div>

      <!-- 비고 -->
      <div class="msec bg">
        <div class="msec-title"><i class="fas fa-sticky-note"></i> 비고</div>
        <textarea class="form-control" id="matNote" rows="2" placeholder="추가 메모 사항" style="resize:vertical;"></textarea>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">
        <i class="fas fa-times"></i> 취소
      </button>
      <button class="btn btn-primary" onclick="saveMaterial()">
        <i class="fas fa-save"></i> 저장
      </button>
    </div>

  </div>
</div>

<!-- 바코드 미리보기 모달 -->
<div class="modal-overlay" id="barcodeModal">
  <div class="modal" style="max-width:400px;text-align:center;">
    <div class="modal-header">
      <h3><i class="fas fa-barcode"></i> 바코드 미리보기</h3>
      <button class="modal-close-btn" onclick="closeBarcode()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" style="padding:24px;">
      <p id="bcMatName" style="font-weight:600;font-size:15px;margin-bottom:16px;"></p>
      <svg id="bcSvg"></svg>
      <p id="bcValue" style="margin-top:10px;font-size:13px;color:#888;"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeBarcode()">닫기</button>
      <button class="btn btn-primary" onclick="printBarcode()">
        <i class="fas fa-print"></i> 인쇄
      </button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="bulkEditModal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <h3><i class="fas fa-layer-group"></i> 선택 자재 일괄 수정</h3>
      <button class="modal-close-btn" onclick="closeBulkEditModal()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="modal-body">
      <div class="msec bg">
        <div class="msec-title"><i class="fas fa-check-square"></i> 수정할 항목 선택</div>

        <div class="grid2 row">
          <div>
            <label><input type="checkbox" id="bulkUseSeries"> 시리즈</label>
            <input type="text" class="form-control" id="bulkSeries" placeholder="예) ControlLogix">
          </div>
          <div>
            <label><input type="checkbox" id="bulkUseVersion"> 버전</label>
            <input type="text" class="form-control" id="bulkVersion" placeholder="예) V2.0">
          </div>
        </div>

        <div class="grid2 row">
          <div>
            <label><input type="checkbox" id="bulkUseCategory"> 카테고리</label>
            <input type="text" class="form-control" id="bulkCategory" placeholder="예) AB > PLC">
          </div>
          <div>
            <label><input type="checkbox" id="bulkUseManager"> 담당자</label>
            <select class="form-control" id="bulkManager">
              <option value="">-- 선택 --</option>
            </select>
          </div>
        </div>

        <div class="grid2 row">
          <div>
            <label><input type="checkbox" id="bulkUseLocation"> 위치</label>
            <input type="text" class="form-control" id="bulkLocation" placeholder="예) A-1-2">
          </div>
          <div>
            <label><input type="checkbox" id="bulkUseMinStock"> 최소재고</label>
            <input type="number" class="form-control" id="bulkMinStock" min="0" placeholder="0">
          </div>
        </div>

        <div class="row">
          <label><input type="checkbox" id="bulkUseDescription"> 비고</label>
          <textarea class="form-control" id="bulkDescription" rows="3" placeholder="비고 일괄 변경"></textarea>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeBulkEditModal()">취소</button>
      <button class="btn btn-primary" onclick="applyBulkEdit()">
        <i class="fas fa-save"></i> 선택 항목 저장
      </button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script src="js/common.js"></script>
<script src="js/excel.js"></script>
<script src="js/label.js"></script>
<script src="js/manual_tx.js"></script>
<script src="js/materials.js"></script>
</body>
</html>
