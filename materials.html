<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>자재 관리 - PLC 재고관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>
<body>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo"><i class="fas fa-microchip"></i><span class="logo-text">PLC 재고관리</span></div>
    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
  </div>
  <ul class="sidebar-menu">
    <li class="menu-item"><a href="index.html"><i class="fas fa-tachometer-alt"></i><span>대시보드</span></a></li>
    <li class="menu-item active"><a href="materials.html"><i class="fas fa-boxes"></i><span>자재 관리</span></a></li>
    <li class="menu-item"><a href="scan.html"><i class="fas fa-barcode"></i><span>바코드 스캔</span></a></li>
    <li class="menu-item"><a href="transactions.html"><i class="fas fa-exchange-alt"></i><span>입출고 이력</span></a></li>
    <li class="menu-item"><a href="inventory.html"><i class="fas fa-clipboard-list"></i><span>재고 현황</span></a></li>
    <li class="menu-item"><a href="categories.html"><i class="fas fa-sitemap"></i><span>카테고리 관리</span></a></li>
    <li class="menu-item"><a href="handlers.html"><i class="fas fa-users"></i><span>담당자 관리</span></a></li>
  </ul>
  <div class="sidebar-footer"><span>v1.0.0</span></div>
</nav>
<main class="main-content" id="mainContent">
  <header class="topbar">
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
  <i class="fas fa-bars"></i>
</button>
    <div class="topbar-title"><h1><i class="fas fa-boxes"></i> 자재 관리</h1></div>
    <div class="topbar-actions">
      <span class="date-badge" id="currentDate"></span>
      <button class="btn btn-success" id="openAddModal"><i class="fas fa-plus"></i> 자재 등록</button>
    </div>
  </header>
  <div class="content-area">
    <div class="card">
      <div class="card-body" style="padding:16px 20px">
        <div class="filter-bar">
          <input type="text" id="searchInput" placeholder="자재명, 코드, 바코드 검색..." class="search-input" style="width:260px">
          <select id="categoryFilter" class="filter-select"><option value="">전체 카테고리</option></select>
          <select id="statusFilter" class="filter-select"><option value="">전체 상태</option><option value="normal">정상</option><option value="low">부족</option><option value="critical">없음</option></select>
          <button class="btn btn-primary btn-sm" id="printAllBarcodes"><i class="fas fa-print"></i> 바코드 일괄 출력</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <h2><i class="fas fa-boxes text-primary"></i> 자재 목록</h2>
        <span id="materialCount" class="badge badge-secondary">-</span>
      </div>
      <div class="card-body" style="padding:0">
        <div class="table-responsive">
          <table class="data-table">
            <thead><tr><th>자재코드</th><th>자재명</th><th>카테고리</th><th>바코드</th><th>위치</th><th>현재재고</th><th>최소재고</th><th>상태</th><th>작업</th></tr></thead>
            <tbody id="materialsTableBody"><tr><td colspan="9" class="text-center"><i class="fas fa-spinner fa-spin"></i></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- 자재 등록/수정 모달 -->
<div class="modal-overlay" id="materialModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle"><i class="fas fa-plus-circle"></i> 자재 등록</h3>
      <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <div class="form-group"><label>자재명 <span class="required">*</span></label><input type="text" id="matName" class="form-control" placeholder="예) 서보 드라이브 (750W)"></div>
        <div class="form-group"><label>자재코드 <span class="required">*</span></label><input type="text" id="matCode" class="form-control" placeholder="예) SDR-750"></div>
      </div>

      <!-- 카테고리 3단계 -->
      <div class="form-group">
        <label><i class="fas fa-sitemap" style="color:#1565c0"></i> 카테고리 <span style="font-size:.73rem;color:#aaa;font-weight:400">(제조사 → 타입 → 모델)</span></label>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:.73rem;font-weight:700;color:#fff;background:#1a1a2e;padding:2px 8px;border-radius:4px;white-space:nowrap">L1</span>
            <select id="catL1" class="form-control" style="margin:0"><option value="">-- 제조사 선택 --</option></select>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:.73rem;font-weight:700;color:#fff;background:#1565c0;padding:2px 8px;border-radius:4px;white-space:nowrap">L2</span>
            <select id="catL2" class="form-control" style="margin:0" disabled><option value="">-- 타입 선택 --</option></select>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:.73rem;font-weight:700;color:#fff;background:#2e7d32;padding:2px 8px;border-radius:4px;white-space:nowrap">L3</span>
            <select id="catL3" class="form-control" style="margin:0" disabled><option value="">-- 모델 선택 (선택사항) --</option></select>
          </div>
          <div id="catPreview" style="display:none;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;padding:8px 12px;font-size:.82rem;color:#2e7d32">
            <i class="fas fa-check-circle"></i> <strong id="catPreviewText"></strong>
          </div>
        </div>
        <input type="hidden" id="matCatL1">
        <input type="hidden" id="matCatL2">
        <input type="hidden" id="matCatL3">
      </div>

      <div class="form-row">
        <div class="form-group"><label>단위</label><input type="text" id="matUnit" class="form-control" list="unitList" placeholder="EA, M, KG..."><datalist id="unitList"><option value="EA"><option value="M"><option value="KG"><option value="개"><option value="BOX"><option value="Set"></datalist></div>
        <div class="form-group"><label>보관 위치</label><input type="text" id="matLocation" class="form-control" placeholder="예) A-01-01"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>최소 재고 수량</label><input type="number" id="matMinStock" class="form-control" placeholder="0" min="0"></div>
        <div class="form-group"><label>초기 재고 수량</label><input type="number" id="matCurrentStock" class="form-control" placeholder="0" min="0"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label><i class="fas fa-code-branch" style="color:#9c27b0"></i> 버전</label><input type="text" id="matVersion" class="form-control" placeholder="예) v1.2, Rev.3"></div>
        <div class="form-group"><label><i class="fas fa-calendar-alt" style="color:#2196F3"></i> 제조일자</label><input type="date" id="matManufactureDate" class="form-control"></div>
      </div>
      <div class="form-group"><label><i class="fas fa-user-tie" style="color:#4CAF50"></i> 담당자</label><input type="text" id="matManager" class="form-control" placeholder="예) 홍길동"></div>
      <div class="form-group">
        <label>바코드 번호</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="matBarcode" class="form-control" placeholder="자동 생성">
          <button type="button" class="btn btn-outline btn-sm" id="genBarcodeBtn" style="color:#2196F3;border-color:#2196F3;white-space:nowrap"><i class="fas fa-sync-alt"></i> 생성</button>
        </div>
      </div>
      <div class="form-group"><label>설명/비고</label><textarea id="matDesc" class="form-control" rows="2" placeholder="자재 설명 또는 비고사항"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" id="cancelModal" style="color:#666;border-color:#ddd">취소</button>
      <button class="btn btn-success" id="saveModal"><i class="fas fa-save"></i> 저장</button>
    </div>
  </div>
</div>

<!-- 바코드 미리보기 모달 -->
<div class="modal-overlay" id="barcodeModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header"><h3><i class="fas fa-barcode"></i> 바코드 미리보기</h3><button class="modal-close" id="closeBarcodeModal"><i class="fas fa-times"></i></button></div>
    <div class="modal-body" style="text-align:center">
      <div class="barcode-preview-wrap">
        <canvas id="barcodeCanvas"></canvas>
        <p id="barcodeMaterialName" style="font-weight:700;margin-top:8px"></p>
        <p id="barcodeMaterialCode" style="color:#888;font-size:.85rem"></p>
        <p id="barcodeMaterialLocation" style="color:#aaa;font-size:.8rem"></p>
      </div>
      <div style="margin-top:16px;display:flex;gap:10px;justify-content:center">
        <button class="btn btn-primary" id="downloadBarcode"><i class="fas fa-download"></i> PNG 다운로드</button>
        <button class="btn btn-success" onclick="window.print()"><i class="fas fa-print"></i> 인쇄</button>
      </div>
    </div>
  </div>
</div>

<!-- 일괄 인쇄 모달 -->
<div class="modal-overlay" id="printAllModal">
  <div class="modal" style="max-width:800px">
    <div class="modal-header"><h3><i class="fas fa-print"></i> 전체 바코드 인쇄</h3><button class="modal-close" id="closePrintAllModal"><i class="fas fa-times"></i></button></div>
    <div class="modal-body"><div id="allBarcodeArea" class="barcode-print-area"></div></div>
    <div class="modal-footer"><button class="btn btn-success" onclick="window.print()"><i class="fas fa-print"></i> 인쇄</button></div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header"><h3 style="color:#f44336"><i class="fas fa-exclamation-triangle"></i> 자재 삭제</h3><button class="modal-close" id="closeDeleteModal"><i class="fas fa-times"></i></button></div>
    <div class="modal-body" style="text-align:center;padding:28px">
      <i class="fas fa-trash-alt" style="font-size:2.8rem;color:#ffcccc;display:block;margin-bottom:14px"></i>
      <p id="deleteConfirmText" style="font-size:1rem;color:#333;margin-bottom:8px"></p>
      <p style="color:#888;font-size:.85rem">삭제 후 복구가 어렵습니다. 계속하시겠습니까?</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" id="cancelDelete" style="color:#666;border-color:#ddd">취소</button>
      <button class="btn btn-danger" id="confirmDelete"><i class="fas fa-trash"></i> 삭제</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/common.js"></script>
<script src="js/materials.js"></script>
</body>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>  ← 이 줄 추가
<nav class="sidebar" id="sidebar">
</html>
