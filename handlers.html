<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>담당자 관리 - PLC 재고관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo"><i class="fas fa-microchip"></i><span class="logo-text">PLC 재고관리</span></div>
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
  </div>
  <ul class="sidebar-menu">
    <li class="menu-item"><a href="index.html"><i class="fas fa-tachometer-alt"></i><span>대시보드</span></a></li>
    <li class="menu-item"><a href="materials.html"><i class="fas fa-boxes"></i><span>자재 관리</span></a></li>
    <li class="menu-item"><a href="scan.html"><i class="fas fa-barcode"></i><span>바코드 스캔</span></a></li>
    <li class="menu-item"><a href="transactions.html"><i class="fas fa-exchange-alt"></i><span>입출고 이력</span></a></li>
    <li class="menu-item"><a href="inventory.html"><i class="fas fa-clipboard-list"></i><span>재고 현황</span></a></li>
    <li class="menu-item"><a href="categories.html"><i class="fas fa-sitemap"></i><span>카테고리 관리</span></a></li>
    <li class="menu-item active"><a href="handlers.html"><i class="fas fa-users"></i><span>담당자 관리</span></a></li>
  </ul>
  <div class="sidebar-footer"><span>v1.0.0</span></div>
</nav>
<main class="main-content" id="mainContent">
  <header class="topbar">
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="topbar-title"><h1><i class="fas fa-users"></i> 담당자 관리</h1></div>
    <div class="topbar-actions">
      <span class="date-badge" id="currentDate"></span>
      <button class="btn btn-success" onclick="openAddModal()"><i class="fas fa-plus"></i> 담당자 추가</button>
    </div>
  </header>
  <div class="content-area">
    <div class="card">
      <div class="card-header">
        <h2><i class="fas fa-users"></i> 담당자 목록</h2>
        <button class="btn btn-outline btn-sm" onclick="loadHandlers()"><i class="fas fa-sync"></i></button>
      </div>
      <div class="card-body">
        <div id="handlerGrid" class="handler-grid">
          <div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i></div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- 담당자 모달 -->
<div class="modal-overlay" id="handlerModal">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <h3 id="handlerModalTitle"><i class="fas fa-user-plus"></i> 담당자 추가</h3>
      <button class="modal-close" onclick="closeOverlay('handlerModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="handlerId">
      <div class="form-group">
        <label>이름 <span class="required">*</span></label>
        <input type="text" id="handlerName" class="form-control" placeholder="담당자 이름">
      </div>
      <div class="form-group">
        <label>부서</label>
        <input type="text" id="handlerDept" class="form-control" placeholder="예: 생산팀">
      </div>
      <div class="form-group">
        <label>연락처</label>
        <input type="text" id="handlerContact" class="form-control" placeholder="예: 010-0000-0000">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeOverlay('handlerModal')">취소</button>
      <button class="btn btn-success" onclick="saveHandler()"><i class="fas fa-save"></i> 저장</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h3><i class="fas fa-trash"></i> 담당자 삭제</h3>
      <button class="modal-close" onclick="closeOverlay('deleteModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <p id="deleteMsg" style="text-align:center;padding:20px 0"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeOverlay('deleteModal')">취소</button>
      <button class="btn btn-danger" onclick="confirmDelete()"><i class="fas fa-trash"></i> 삭제</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/common.js"></script>
<script src="js/handlers.js"></script>
</body>
</html>
