<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>담당자 관리 - PLC 재고관리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo"><i class="fas fa-microchip"></i><span class="logo-text">PLC 재고관리</span></div>
    <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
  </div>
  <ul class="sidebar-menu">
    <li class="menu-item"><a href="index.html"><i class="fas fa-tachometer-alt"></i><span>대시보드</span></a></li>
    <li class="menu-item"><a href="materials.html"><i class="fas fa-boxes"></i><span>자재 관리</span></a></li>
    <li class="menu-item"><a href="scan.html"><i class="fas fa-barcode"></i><span>바코드 스캔</span></a></li>
    <li class="menu-item"><a href="transactions.html"><i class="fas fa-exchange-alt"></i><span>입출고 이력</span></a></li>
    <li class="menu-item"><a href="inventory.html"><i class="fas fa-clipboard-list"></i><span>재고 현황</span></a></li>
    <li class="menu-item"><a href="categories.html"><i class="fas fa-sitemap"></i><span>카테고리 관리</span></a></li>
    <li class="menu-item active"><a href="handlers.html"><i class="fas fa-users"></i><span>담당자 관리</span></a></li>
  </ul>
  <div class="sidebar-footer"><span>v1.0.0</span></div>
</nav>
<main class="main-content" id="mainContent">
  <header class="topbar">
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
  <i class="fas fa-bars"></i>
</button>
    <div class="topbar-title"><h1><i class="fas fa-users"></i> 담당자 관리</h1></div>
    <div class="topbar-actions">
      <span class="date-badge" id="currentDate"></span>
      <button class="btn btn-primary" id="addHandlerBtn"><i class="fas fa-plus"></i> 담당자 추가</button>
    </div>
  </header>
  <div class="content-area">
    <div class="card">
      <div class="card-header">
        <h2><i class="fas fa-users text-primary"></i> 담당자 목록</h2>
        <span id="handlerCount" class="badge badge-secondary">-</span>
      </div>
      <div class="card-body">
        <div class="handler-grid" id="handlerGrid"><div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> 로딩 중...</div></div>
      </div>
    </div>
  </div>
</main>

<!-- 담당자 추가/수정 모달 -->
<div class="modal-overlay" id="handlerModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header"><h3 id="handlerModalTitle"><i class="fas fa-user-plus"></i> 담당자 추가</h3><button class="modal-close" id="closeHandlerModal"><i class="fas fa-times"></i></button></div>
    <div class="modal-body">
      <div class="form-group"><label>이름 <span class="required">*</span></label><input type="text" id="handlerName" class="form-control" placeholder="예) 홍길동"></div>
      <div class="form-group"><label>부서</label><input type="text" id="handlerDept" class="form-control" placeholder="예) 생산팀, 자재팀"></div>
      <div class="form-group"><label>연락처</label><input type="text" id="handlerContact" class="form-control" placeholder="예) 010-1234-5678"></div>
      <div class="form-group"><label>정렬 순서</label><input type="number" id="handlerOrder" class="form-control" value="0" min="0"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" id="cancelHandlerModal" style="color:#666;border-color:#ddd">취소</button>
      <button class="btn btn-primary" id="saveHandlerBtn"><i class="fas fa-save"></i> 저장</button>
    </div>
  </div>
</div>

<!-- 담당자 삭제 모달 -->
<div class="modal-overlay" id="handlerDeleteModal">
  <div class="modal" style="max-width:400px">
    <div class="modal-header"><h3 style="color:#f44336"><i class="fas fa-exclamation-triangle"></i> 담당자 삭제</h3><button class="modal-close" id="closeHandlerDeleteModal"><i class="fas fa-times"></i></button></div>
    <div class="modal-body" style="text-align:center;padding:28px">
      <i class="fas fa-user-times" style="font-size:2.8rem;color:#ffcccc;display:block;margin-bottom:14px"></i>
      <p id="handlerDeleteText" style="font-size:1rem;color:#333;margin-bottom:8px"></p>
      <p style="color:#888;font-size:.85rem">삭제 후 복구가 어렵습니다.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" id="cancelHandlerDelete" style="color:#666;border-color:#ddd">취소</button>
      <button class="btn btn-danger" id="confirmHandlerDelete"><i class="fas fa-trash"></i> 삭제</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/common.js"></script>
<script src="js/handlers.js"></script>
</body>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>  ← 이 줄 추가
<nav class="sidebar" id="sidebar">
</html>
